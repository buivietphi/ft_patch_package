name: ft_patch_package
description: >-
  Patch Flutter & Dart packages like React Native's patch-package.
  Create, store, and auto-apply patches to pub dependencies after pub get.
  Fix bugs in third-party packages without forking.
version: 1.0.0
homepage: https://github.com/buivietphi/ft_patch_package
repository: https://github.com/buivietphi/ft_patch_package
topics:
  - patch
  - patch-package
  - diff
  - dependency-management
  - cli

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  path: ^1.9.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0

executables:
  ft_patch_package: ft_patch_package
